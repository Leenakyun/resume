<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이나경 Portfolio</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header class="profile-card">
        <img src="images/profile.jpg"
             alt="프로필 사진"
             id="main-prof-img"
             class="profile-img">

        <div class="profile-text">
            <h1 id="main-prof-name">이나경</h1>
            <h2 id="main-prof-job">AI Data QA Specialist</h2>
            <p>
                AI 데이터 QA · 데이터 어노테이션
            </p>
            <button id="darkModeBtn">
                🌙 Dark Mode
            </button>
        </div>
    </header>

    <section class="card">
        <h2>🙋 자기소개</h2>
        <div id="intro">
            포트폴리오 데이터를 불러오는 중입니다...
        </div>
    </section>

    <section class="card">
        <h2>💼 경력</h2>
        <div id="career" class="timeline"></div>
    </section>

    <section class="card">
        <h2>🎓 학력</h2>
        <div id="education"></div>
    </section>

    <section class="card">
        <h2>🏆 자격증</h2>
        <div id="license"></div>
    </section>

    <section class="card">
        <h2>💻 기술</h2>
        <div id="skills" class="skill-list"></div>
    </section>

    <section class="card">
        <h2>📁 Portfolio</h2>
        <p>
            관리자 대시보드에서 등록한 프로젝트 리스트가 아래에 표시됩니다.
        </p>
        <div id="main-project-grid" class="project-grid"></div>
    </section>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
